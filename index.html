<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>닥터마켓 - 실시간 국내주식</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
/* ============================================================ BASE ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* Claude Brand Colors */
  --primary: #D97757;
  --primary-dark: #C4622D;
  --primary-light: #F5C4A8;
  --primary-faint: #FDF0E8;
  --up: #e53e3e;
  --down: #3182ce;
  --bg: #FAF7F4;
  --card-bg: #FFFFFF;
  --text: #2D2318;
  --sub: #9C8878;
  --border: #EDE0D8;
  --nav-h: 60px;
}
html, body, #root { height: 100%; font-family: 'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif; font-size: 13px; background: var(--bg); color: var(--text); }
.up { color: var(--up); } .down { color: var(--down); }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
.app-container { max-width: 430px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: var(--bg); position: relative; overflow: hidden; }
.content-area { flex: 1; overflow-y: auto; padding-bottom: calc(var(--nav-h) + 8px); -webkit-overflow-scrolling: touch; }
.content-area::-webkit-scrollbar { display: none; }

/* ── HEADER ── */
.header { background: linear-gradient(135deg, #D97757 0%, #C4622D 100%); padding: 8px 12px 6px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(196,98,45,.3); }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.header-logo { display: flex; align-items: center; gap: 6px; flex-shrink: 0; min-width: 0; }
.logo-mark { width:28px;height:28px;background:rgba(255,255,255,.22);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff; }
.logo-text { font-size: 19px; font-weight: 900; color: #fff; letter-spacing: -0.5px; white-space: nowrap; flex-shrink: 0; }
.logo-badge { background: rgba(255,255,255,.22); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.header-time { color: rgba(255,255,255,.8); font-size: 11px; }
.header-icons { display: flex; gap: 8px; }
.icon-btn { width:30px;height:30px;background:rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center; }
.search-bar { display:flex;align-items:center;background:rgba(255,255,255,.95);border-radius:22px;padding:0 12px;height:36px;gap:8px; }
.search-input { flex:1;border:none;outline:none;font-size:13px;color:var(--text);background:transparent; }
.search-btn { font-size:15px;color:var(--primary-dark); }

/* ── BOTTOM NAV ── */
.bottom-nav { position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--nav-h);background:#fff;display:flex;border-top:1px solid var(--border);z-index:200;box-shadow:0 -2px 12px rgba(0,0,0,.07); }
.nav-item { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--sub);font-size:10px;transition:color .2s; }
.nav-item.active { color:var(--primary); }
.nav-icon { font-size:20px;line-height:1; }
.nav-label { font-size:10px;font-weight:500; }

/* ── MARKET INDICES ── */
.market-indices { background:var(--card-bg);padding:8px 0;border-bottom:1px solid var(--border); }
.indices-scroll { display:flex;gap:4px;padding:0 10px;overflow-x:auto; }
.indices-scroll::-webkit-scrollbar { display:none; }
.index-card { min-width:96px;background:var(--primary-faint);border:1px solid var(--border);border-radius:8px;padding:6px 10px;text-align:center;flex-shrink:0;cursor:pointer;transition:background .15s; }
.index-card:active { background:var(--primary-light); }
.index-name { font-size:10px;color:var(--sub);margin-bottom:2px; }
.index-value { font-size:12px;font-weight:700;color:var(--text); }
.index-change { font-size:11px;font-weight:600;margin-top:1px; }

/* ── INDEX CHART MODAL ── */
.chart-modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:flex-end;justify-content:center; }
.chart-modal-sheet { background:#fff;width:100%;max-width:430px;border-radius:20px 20px 0 0;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .3s ease; }
.chart-modal-header { background:linear-gradient(135deg,#D97757,#C4622D);padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center; }
.chart-modal-title { font-size:17px;font-weight:900;color:#fff; }
.chart-body { padding:14px 16px 20px;overflow-y:auto; }
.chart-period-tabs { display:flex;gap:4px;margin-bottom:12px; }
.chart-period-btn { padding:5px 14px;border-radius:14px;font-size:11px;font-weight:600;color:var(--sub);background:var(--primary-faint);cursor:pointer;border:none;font-family:inherit; }
.chart-period-btn.active { background:var(--primary);color:#fff; }
.chart-stat-row { display:flex;justify-content:space-between;margin-top:10px;padding:10px 14px;background:var(--primary-faint);border-radius:10px; }

/* ── NEWS TICKER ── */
.news-ticker-wrap { background:#FFF8F4;border-bottom:1px solid #F5C4A8;padding:6px 0;overflow:hidden;white-space:nowrap; }
.ticker-inner { display:inline-flex;will-change:transform; }
.ticker-item { font-size:11px;color:#A0522D;padding-right:8px;white-space:nowrap; }
.ticker-sep { margin:0 6px;color:#F5C4A8; }

/* ── THEME GRID ── */
.theme-section { padding:10px 8px 0; }
.section-title-bar { display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px; }
.section-title { font-size:15px;font-weight:800;color:var(--text); }
.section-subtitle { font-size:11px;color:var(--sub);background:var(--primary-faint);padding:2px 8px;border-radius:10px; }
.theme-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
.theme-card { background:var(--card-bg);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07); }
.theme-card-header { background:linear-gradient(135deg,#D97757,#C4622D);display:flex;justify-content:space-between;align-items:center;padding:8px 10px;cursor:pointer;user-select:none; }
.theme-card-header:active { opacity:.9; }
.theme-card-title { display:flex;align-items:center;gap:4px; }
.star-icon { color:#FFD700;font-size:12px; }
.theme-name { font-size:13px;font-weight:800;color:#fff; }
.theme-score { font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,.25);padding:1px 6px;border-radius:8px; }
.theme-headline { font-size:10px;color:var(--sub);padding:5px 8px 3px;border-bottom:1px solid #F5EDE8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.theme-stocks { padding:4px 0; }
.stock-row { padding:4px 8px;cursor:pointer;transition:background .15s;border-radius:4px;position:relative; }
.stock-row:active { background:#FDF0E8; }
.fav-dot { position:absolute;top:5px;right:6px;font-size:9px;color:#FFB347; }
.flash-up { animation:flashUp .4s ease; }
.flash-down { animation:flashDown .4s ease; }
@keyframes flashUp { 0%{background:rgba(229,62,62,.2)} 100%{background:transparent} }
@keyframes flashDown { 0%{background:rgba(49,130,206,.2)} 100%{background:transparent} }
.stock-name-row { display:flex;align-items:center;gap:4px;margin-bottom:1px; }
.crown-icon { font-size:11px; }
.stock-name { font-size:12px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:74px; }
.stock-change { font-size:11px;font-weight:700; }
.stock-price-row { display:flex;justify-content:space-between;align-items:center; }
.stock-price { font-size:12px;font-weight:700; }
.stock-amount { font-size:10px;color:var(--sub); }
.stock-bar-wrap { padding:2px 0; }
.stock-bar-track { height:3px;background:#EDE0D8;border-radius:2px;overflow:hidden;position:relative; }
.stock-bar-fill { height:100%;border-radius:2px;position:absolute;left:0;transition:width .5s ease; }
.bar-up { background:var(--up); }
.bar-down { background:var(--down); }

/* ── THEME DETAIL MODAL ── */
.theme-modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:flex;align-items:flex-end;justify-content:center; }
.theme-modal-sheet { background:var(--bg);width:100%;max-width:430px;border-radius:20px 20px 0 0;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .3s ease; }
.theme-modal-header { background:linear-gradient(135deg,#D97757,#C4622D);padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center; }
.theme-modal-title { font-size:17px;font-weight:900;color:#fff; }
.theme-modal-meta { display:flex;align-items:center;gap:8px; }
.theme-modal-score { font-size:13px;color:rgba(255,255,255,.9);background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px; }
.theme-modal-close { width:28px;height:28px;background:rgba(255,255,255,.2);border-radius:50%;font-size:14px;color:#fff;display:flex;align-items:center;justify-content:center; }
.theme-modal-body { flex:1;overflow-y:auto;padding:12px 10px; }
.theme-modal-body::-webkit-scrollbar { display:none; }
.theme-stock-row { background:var(--card-bg);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer; }
.theme-stock-row:active { background:var(--primary-faint); }
.theme-stock-rank { width:22px;height:22px;border-radius:50%;background:var(--primary-faint);color:var(--primary-dark);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.theme-stock-rank.r1 { background:#FFD700;color:#7A5800; }
.theme-stock-rank.r2 { background:#C0C0C0;color:#444; }
.theme-stock-rank.r3 { background:#CD7F32;color:#fff; }
.theme-stock-main { flex:1;min-width:0; }
.theme-stock-name-row { display:flex;align-items:center;gap:6px;margin-bottom:2px; }
.theme-sname { font-size:14px;font-weight:700;color:var(--text); }
.theme-stock-price-row { display:flex;align-items:center;gap:8px; }
.theme-sprice { font-size:13px;font-weight:700; }
.theme-svol { font-size:10px;color:var(--sub); }
.theme-schange { font-size:15px;font-weight:900;min-width:60px;text-align:right; }
.theme-stock-actions { display:flex;gap:4px; }
.action-btn { width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--primary-faint); }
.action-btn.fav-active { background:#FFF3CD; }

/* ── STOCK DETAIL MODAL ── */
.modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center; }
.modal-sheet { background:#fff;width:100%;max-width:430px;border-radius:20px 20px 0 0;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .3s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0; }
.modal-header { display:flex;align-items:center;padding:12px 16px 10px;gap:10px;border-bottom:1px solid var(--border); }
.modal-stock-info { flex:1; }
.modal-stock-name { font-size:18px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px; }
.modal-fav-btn { font-size:18px;background:none;padding:0; }
.modal-stock-code { font-size:11px;color:var(--sub);margin-top:2px; }
.modal-price-info { text-align:right; }
.modal-price { font-size:20px;font-weight:900; }
.modal-change { font-size:13px;font-weight:700; }
.modal-close { width:28px;height:28px;background:var(--primary-faint);border-radius:50%;font-size:14px;color:var(--sub);display:flex;align-items:center;justify-content:center; }
.modal-tabs { display:flex;border-bottom:1px solid var(--border); }
.modal-tab { flex:1;padding:10px 0;font-size:12px;font-weight:600;color:var(--sub);text-align:center;border-bottom:2px solid transparent;transition:all .2s; }
.modal-tab.active { color:var(--primary);border-bottom-color:var(--primary); }
.modal-body { flex:1;overflow-y:auto;padding:16px; }
.modal-body::-webkit-scrollbar { display:none; }
.detail-section-title { font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px; }
.theme-tag-row { display:flex;align-items:center;gap:10px;margin-bottom:8px; }
.theme-tag { background:var(--primary-faint);color:var(--primary-dark);font-size:13px;font-weight:700;padding:4px 12px;border-radius:14px; }
.theme-tag-desc { font-size:11px;color:var(--sub); }
.theme-summary { font-size:13px;line-height:1.7;color:#5C4A3A;background:var(--primary-faint);padding:12px;border-radius:8px; }
.news-item { padding:12px 0;border-bottom:1px solid var(--border); }
.news-meta { display:flex;align-items:center;gap:6px;margin-bottom:4px; }
.news-tag { font-size:10px;font-weight:700;color:var(--up);background:#fff5f5;padding:1px 6px;border-radius:4px; }
.news-time { font-size:10px;color:var(--sub); }
.news-title { font-size:13px;font-weight:600;color:var(--text);line-height:1.5; }
.limitup-count { font-size:13px;color:var(--sub);margin-bottom:14px; }
.limitup-count strong { color:var(--up);font-size:16px; }
.limitup-item { background:#fff5f5;border-left:3px solid var(--up);border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px; }
.limitup-date { font-size:10px;color:var(--sub);margin-bottom:4px; }
.limitup-reason { font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px; }
.limitup-price { font-size:12px;font-weight:700; }
.no-data { text-align:center;color:var(--sub);padding:30px 0;font-size:13px; }
/* Memo */
.memo-area { width:100%;min-height:120px;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--text);resize:vertical;outline:none;transition:border-color .2s;background:var(--bg); }
.memo-area:focus { border-color:var(--primary); }
.memo-save-btn { margin-top:8px;width:100%;padding:10px;background:var(--primary);color:#fff;border-radius:10px;font-size:13px;font-weight:700; }
.memo-save-btn:active { background:var(--primary-dark); }
.memo-saved-msg { font-size:11px;color:var(--primary-dark);margin-top:4px;text-align:center; }

/* ── RANKING VIEW ── */
.ranking-view { padding:12px 10px; }
.ranking-header { margin-bottom:12px; }
.ranking-title { font-size:18px;font-weight:900;color:var(--text); }
.rank-tabs { display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap; }
.rank-tab { padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;color:var(--sub);background:var(--primary-faint);transition:all .2s; }
.rank-tab.active { background:var(--primary);color:#fff; }
.rank-list { background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07); }
.rank-list-header { display:grid;grid-template-columns:30px 1fr 70px 58px 68px;gap:4px;padding:8px 12px;background:var(--primary-faint);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--sub);text-align:right; }
.rank-list-header span:nth-child(2) { text-align:left; }
.rank-row { display:grid;grid-template-columns:30px 1fr 70px 58px 68px;gap:4px;padding:10px 12px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .15s; }
.rank-row:last-child { border-bottom:none; }
.rank-row:active { background:var(--primary-faint); }
.rank-num { font-size:13px;font-weight:800;text-align:center; }
.rank-1 { color:#C8960C; } .rank-2 { color:#718096; } .rank-3 { color:#c05621; } .rank-other { color:var(--sub); }
.rank-stock-info { display:flex;flex-direction:column;gap:2px; }
.rank-stock-name { font-size:12px;font-weight:700;color:var(--text); }
.rank-market-badge { font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;width:fit-content; }
.market-KOSPI { background:#FDF0E8;color:#A0522D; }
.market-KOSDAQ { background:#f0fff4;color:#276749; }
.rank-price { font-size:12px;font-weight:700;text-align:right; }
.rank-change { font-size:11px;font-weight:700;text-align:right; }
.rank-sub { font-size:10px;color:var(--sub);text-align:right; }

/* ── CALENDAR VIEW ── */
.calendar-view { padding:12px 10px; }
.cal-header { display:flex;align-items:center;gap:8px;margin-bottom:12px; }
.cal-nav { width:28px;height:28px;background:var(--primary-faint);border-radius:6px;font-size:18px;color:var(--text);display:flex;align-items:center;justify-content:center; }
.cal-title { flex:1;font-size:16px;font-weight:800;color:var(--text); }
.cal-view-toggle { display:flex;gap:2px; }
.cal-toggle-btn { padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;color:var(--sub);background:var(--primary-faint); }
.cal-toggle-btn.active { background:var(--primary);color:#fff; }
.cal-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px;background:#fff;border-radius:12px;padding:10px 6px;box-shadow:0 1px 4px rgba(0,0,0,.07); }
.cal-day-label { text-align:center;font-size:11px;font-weight:700;color:var(--sub);padding:4px 0; }
.cal-day { aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;position:relative;font-size:12px;color:var(--text); }
.cal-day-empty { cursor:default; }
.cal-today { background:var(--primary);color:#fff; }
.cal-selected:not(.cal-today) { background:var(--primary-faint);color:var(--primary-dark);font-weight:700; }
.cal-day-num { font-size:12px;font-weight:600; }
.cal-dot { width:4px;height:4px;background:var(--up);border-radius:50%;position:absolute;bottom:3px; }
.cal-events { background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07); }
.cal-events-date { font-size:14px;font-weight:800;color:var(--primary-dark);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border); }
.cal-no-event { font-size:13px;color:var(--sub);text-align:center;padding:20px 0; }
.cal-event-item { display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--primary-faint); }
.cal-event-dot { font-size:14px;line-height:1.4;flex-shrink:0; }
.cal-event-text { font-size:12px;color:var(--text);line-height:1.5; }
.cal-legend { display:flex;gap:10px;flex-wrap:wrap;font-size:10px;padding:6px 2px; }

/* ── MARKET OVERVIEW ── */
.market-overview { padding:12px 10px; }
.overview-title { font-size:18px;font-weight:900;margin-bottom:14px; }
.overview-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px; }
.overview-card { background:#fff;border-radius:12px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid transparent; }
.card-up { border-top-color:var(--up); }
.card-down { border-top-color:var(--down); }
.overview-flag { font-size:20px;margin-bottom:4px; }
.overview-name { font-size:11px;color:var(--sub);margin-bottom:4px; }
.overview-value { font-size:15px;font-weight:800;margin-bottom:2px; }
.overview-change { font-size:11px;font-weight:700; }
.overview-rate { font-size:10px;margin-left:2px; }
.overview-bar { height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden; }
.overview-bar-fill { height:100%;border-radius:2px;transition:width .5s; }
.overview-section { background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07); }
.overview-section-title { font-size:14px;font-weight:800;margin-bottom:12px;color:var(--text); }
.investor-table { display:flex;flex-direction:column; }
.investor-row { display:grid;grid-template-columns:50px 1fr 1fr 80px;gap:4px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px;align-items:center;text-align:right; }
.investor-row span:first-child { text-align:left;font-weight:700; }
.investor-row.header { font-size:10px;font-weight:700;color:var(--sub);border-bottom:2px solid var(--border); }
.sector-list { display:flex;flex-direction:column;gap:8px; }
.sector-item { display:grid;grid-template-columns:55px 1fr 50px;gap:8px;align-items:center; }
.sector-name { font-size:11px;font-weight:700;color:var(--text); }
.sector-bar-wrap { height:12px;background:var(--primary-faint);border-radius:6px;overflow:hidden;position:relative; }
.sector-bar { height:100%;border-radius:6px;position:absolute; }
.sector-bar.bar-up { background:rgba(229,62,62,.65);left:50%; }
.sector-bar.bar-down { background:rgba(49,130,206,.65);right:50%; }

// ======================== CHART UTILS ========================
function generateChartData(currentValue, days) {
  const seed = currentValue + days;
  let v = currentValue * (1 - 0.04 - (seed % 7) * 0.004);
  const pts = [];
  for (let i = 0; i < days - 1; i++) {
    pts.push(v);
    const drift = (currentValue - v) / (days - i) * 0.3;
    v = v * (1 + (Math.sin(i * 1.7 + seed) * 0.006 + Math.cos(i * 2.3) * 0.004)) + drift;
  }
  pts.push(currentValue);
  return pts;
}

// 분봉 OHLC 데이터 생성 (candles개 분봉, 끝값=currentValue)
function generateCandleData(currentValue, candles, minuteInterval) {
  const seed = currentValue % 1000;
  // 시작가 = 현재가에서 살짝 아래
  let close = currentValue * (1 - 0.008 - (seed % 5) * 0.001);
  const data = [];
  for (let i = 0; i < candles; i++) {
    const open = close;
    const drift = (currentValue - close) / (candles - i) * 0.4;
    const vol = open * 0.0025 * (1 + Math.sin(i * 2.1) * 0.5);
    close = open + drift + (Math.sin(i * 1.7 + seed) * vol);
    const high = Math.max(open, close) * (1 + Math.random() * 0.002);
    const low  = Math.min(open, close) * (1 - Math.random() * 0.002);
    // 시간 레이블: 오전 9:00부터 minuteInterval씩 증가
    const totalMin = 9 * 60 + i * minuteInterval;
    const hh = Math.floor(totalMin / 60), mm = totalMin % 60;
    const label = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
    data.push({ open, high, low, close, label });
  }
  // 마지막 봉의 close를 currentValue로 맞춤
  if (data.length > 0) {
    const last = data[data.length - 1];
    last.close = currentValue;
    last.high = Math.max(last.high, currentValue);
    last.low  = Math.min(last.low, currentValue);
  }
  return data;
}

const API_BASE = (
  window.DRMARKET_API_URL ||

  'https://drmarket-production.up.railway.app'
);
const WS_BASE  = API_BASE ? API_BASE.replace(/^http/, 'ws') : '';

async function apiFetch(path, fallback) {
  if (!API_BASE) return fallback;
  try {
    const res = await fetch(API_BASE + path);
    if (!res.ok) throw new Error(res.status);
    return await res.json();
  } catch(e) {
    console.warn('[API] 실패, 시뮬레이션 사용:', path, e.message);
    return fallback;
  }
}

// ======================== REALTIME HOOK ========================
function useRealtimeData() {
  const [themes,  setThemes]  = useState(() => JSON.parse(JSON.stringify(THEMES_BASE)));
  const [indices, setIndices] = useState(() => JSON.parse(JSON.stringify(MARKET_INDICES_BASE)));
  const [ranking, setRanking] = useState(() => JSON.parse(JSON.stringify(RANKING_BASE)));
  const [apiStatus, setApiStatus] = useState(API_BASE ? 'connecting' : 'simulation');
  const [flashMap, setFlashMap] = useState({});
  const [lastUpdated, setLastUpdated] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const prev = useRef({});
  const wsRef = useRef(null);
  const apiLive = useRef(false);   // API 연결 여부 추적

  // API 필드명 → 프론트엔드 필드명 변환
  const toFront = (r, i) => ({
    rank: i + 1,
    code: r.code,
    name: r.name,
    market: r.market || 'KOSPI',
    price: r.price || 0,
    change: r.change_rate !== undefined ? r.change_rate : (r.change || 0),
    amount: r.trading_value || r.amount || 0,
    tradeVol: r.volume || r.tradeVol || 0,
    views: r.views || 0,
  });

  // 모든 테마 종목 실시간 가격 일괄 조회 (랭킹 API 폴백 포함)
  const refreshThemePrices = useCallback(async (rankingData) => {
    const codes = [...new Set(THEMES_BASE.flatMap(t => t.stocks.map(s => s.code.replace(/^A/, ''))))];
    const priceMap = {};

    // 1차: batch price API 시도
    for (let i = 0; i < codes.length; i += 20) {
      const batch = codes.slice(i, i + 20);
      const data = await apiFetch(`/api/stock/batch/prices?codes=${batch.join(',')}`, null);
      if (data?.stocks) data.stocks.forEach(s => { if (s.code && s.price > 0) priceMap[s.code] = s; });
    }

    // 2차 폴백: 랭킹 API 데이터 활용 (batch가 실패했을 때)
    if (Object.keys(priceMap).length === 0 && rankingData) {
      const allRankItems = [
        ...(rankingData.volume_amount || []),
        ...(rankingData.change_rate   || []),
        ...(rankingData.trade_volume  || []),
      ];
      allRankItems.forEach(r => {
        const rawCode = (r.code || '').replace(/^A/, '');
        if (rawCode && r.price > 0 && !priceMap[rawCode]) {
          priceMap[rawCode] = { code: rawCode, price: r.price, change_rate: r.change };
        }
      });
    }

    if (Object.keys(priceMap).length === 0) return;
    const flash = {};
    setThemes(prev_t => prev_t.map(theme => {
      // 종목 가격 업데이트
      const updatedStocks = theme.stocks.map(s => {
        const real = priceMap[s.code.replace(/^A/, '')];
        if (!real || !real.price) return s;
        const np = real.price, nc = real.change_rate ?? s.change;
        if (prev.current[s.code] !== undefined && prev.current[s.code] !== np)
          flash[s.code] = np > prev.current[s.code] ? 'up' : 'down';
        prev.current[s.code] = np;
        return {...s, price: np, change: nc};
      });

      // 오늘의 테마 점수 = 실시간 데이터가 있는 종목들의 평균 등락률
      const liveStocks = updatedStocks.filter(s => priceMap[s.code.replace(/^A/, '')]);
      const todayScore = liveStocks.length > 0
        ? Math.round(liveStocks.reduce((sum, s) => sum + s.change, 0) / liveStocks.length * 100) / 100
        : theme.score;

      // 오늘의 헤드라인 = 상승률 1위 종목 기반 동적 생성
      const topStock = [...updatedStocks].sort((a, b) => b.change - a.change)[0];
      const todayHeadline = topStock
        ? `${topStock.name} ${topStock.change >= 0 ? '+' : ''}${topStock.change.toFixed(2)}% · ${theme.name} 테마 주목`
        : theme.headline;

      return {
        ...theme,
        stocks: updatedStocks,
        score: todayScore,
        headline: todayHeadline,
      };
    }));
    if (Object.keys(flash).length) { setFlashMap(flash); setTimeout(() => setFlashMap({}), 400); }
    setLastUpdated(new Date());
  }, []);

  // 랭킹 전체 갱신 — 결과를 반환해서 테마 가격 폴백에도 사용
  const refreshRanking = useCallback(async () => {
    const [ra, rc, rv, rviews] = await Promise.all([
      apiFetch('/api/ranking/amount', null),
      apiFetch('/api/ranking/change', null),
      apiFetch('/api/ranking/volume', null),
      apiFetch('/api/ranking/views', null),
    ]);
    const newRanking = {
      volume_amount: ra?.ranking     ? ra.ranking.map(toFront)     : RANKING_BASE.volume_amount,
      change_rate:   rc?.ranking     ? rc.ranking.map(toFront)     : RANKING_BASE.change_rate,
      trade_volume:  rv?.ranking     ? rv.ranking.map(toFront)     : RANKING_BASE.trade_volume,
      views:         rviews?.ranking ? rviews.ranking.map(toFront) : RANKING_BASE.views,
    };
    setRanking(newRanking);
    return newRanking;
  }, []);

  // 지수 갱신
  const refreshIndices = useCallback(async () => {
    const d = await apiFetch('/api/market/indices', null);
    if (d?.indices) setIndices(d.indices);
  }, []);

  // 오프라인 시뮬레이션 (API 완전 없을 때만)
  const startSimulation = useCallback(() => {
    const id = setInterval(() => {
      const flash = {};
      setThemes(t => t.map(theme => ({
        ...theme,
        stocks: theme.stocks.map(s => {
          const np=rnd(s.price), nc=rndC(s.change);
          if(prev.current[s.code]!==undefined&&prev.current[s.code]!==np) flash[s.code]=np>prev.current[s.code]?'up':'down';
          prev.current[s.code]=np;
          return {...s,price:np,change:nc};
        })
      })));
      setIndices(idx => idx.map(i => {
        const nv=Math.round((i.value+(Math.random()-.5)*i.value*0.001)*100)/100;
        const nc=Math.round((i.change+(Math.random()-.5)*0.5)*100)/100;
        const nr=Math.round((nc/(nv-nc))*10000)/100;
        return {...i,value:nv,change:nc,changeRate:nr};
      }));
      setFlashMap(flash);
      setTimeout(()=>setFlashMap({}),400);
    }, 2000);
    return id;
  }, []);

  useEffect(() => {
    let simId = null;
    let refreshIntervalId = null;

    // 서버 없으면 바로 시뮬레이션
    if (!API_BASE) { simId = startSimulation(); setApiStatus('simulation'); return () => clearInterval(simId); }

    // 최초 실시간 데이터 로드
    (async () => {
      const [, rankData] = await Promise.all([refreshIndices(), refreshRanking()]);
      await refreshThemePrices(rankData);
      apiLive.current = true;
      // 30초마다 전체 갱신
      refreshIntervalId = setInterval(async () => {
        const [, newRankData] = await Promise.all([refreshIndices(), refreshRanking()]);
        await refreshThemePrices(newRankData);
      }, 30000);
    })();

    // WebSocket 실시간 연결 (추가 구독 종목 실시간 업데이트용)
    const connectWS = () => {
      try {
        const ws = new WebSocket(WS_BASE + '/ws/prices');
        wsRef.current = ws;

        ws.onopen = () => {
          setApiStatus('live');
          console.log('[WS] 서버 연결됨:', WS_BASE);
          if (simId) { clearInterval(simId); simId = null; }
          const ping = setInterval(() => ws.readyState === 1 && ws.send(JSON.stringify({action:'ping'})), 20000);
          ws._ping = ping;
        };

        ws.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type !== 'price') return;
            const tick = msg.data;
            const flash = {};
            const prevP = prev.current[tick.code];
            if (prevP !== undefined && prevP !== tick.price)
              flash[tick.code] = tick.price > prevP ? 'up' : 'down';
            prev.current[tick.code] = tick.price;
            setThemes(themes => themes.map(theme => ({
              ...theme,
              stocks: theme.stocks.map(s =>
                s.code === ('A' + tick.code) || s.code === tick.code
                  ? {...s, price: tick.price, change: tick.change_rate}
                  : s
              )
            })));
            if (Object.keys(flash).length) { setFlashMap(flash); setTimeout(() => setFlashMap({}), 400); }
          } catch {}
        };

        ws.onerror = () => { setApiStatus('error'); };
        ws.onclose = () => {
          clearInterval(ws._ping);
          setApiStatus('reconnecting');
          setTimeout(connectWS, 5000);
        };
      } catch(e) {
        setApiStatus('error');
        setTimeout(connectWS, 5000);
      }
    };

    connectWS();

    return () => {
      clearInterval(simId);
      clearInterval(refreshIntervalId);
      if (wsRef.current) wsRef.current.close();
    };
  }, [startSimulation, refreshIndices, refreshThemePrices, refreshRanking]);

  const manualRefresh = useCallback(async () => {
    if (refreshing) return;
    setRefreshing(true);
    const [, rankData] = await Promise.all([refreshIndices(), refreshRanking()]);
    await refreshThemePrices(rankData);
    setRefreshing(false);
  }, [refreshing, refreshIndices, refreshThemePrices, refreshRanking]);

  return {themes, indices, ranking, flashMap, apiStatus, lastUpdated, refreshing, manualRefresh};
}

  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    let pos=0,raf;
    const run=()=>{ pos-=0.5; if(Math.abs(pos)>el.scrollWidth/2) pos=0; el.style.transform=`translateX(${pos}px)`; raf=requestAnimationFrame(run); };
    raf=requestAnimationFrame(run);
    return ()=>cancelAnimationFrame(raf);
  },[]);
  const items=[...NEWS_TICKER,...NEWS_TICKER];
  return (
    <div className="news-ticker-wrap">

  );

  const allStocks = React.useMemo(() => {
    const seen = new Set();
    const list = [];
    themes.forEach(t => t.stocks.forEach(s => {
      if (!seen.has(s.code)) { seen.add(s.code); list.push({...s, themeName: t.name}); }
    }));
    return list;
  }, [themes]);

  const matchQ = q.toLowerCase();
  const matchedStocksFromThemes = isSearching
    ? allStocks.filter(s => s.name.toLowerCase().includes(matchQ) || s.code.toLowerCase().includes(matchQ))
    : [];
  const themeStockCodes = new Set(allStocks.map(s => s.code));
  const matchedStocksFromList = isSearching
    ? STOCK_LIST.filter(s => !themeStockCodes.has(s.code) && (s.name.toLowerCase().includes(matchQ) || s.code.toLowerCase().includes(matchQ)))
        .map(s => ({...s, price: 0, change: 0, volume: 0, themeName: '종목'}))
    : [];
  const matchedStocks = [...matchedStocksFromThemes, ...matchedStocksFromList];

  const sorted = [...themes].sort((a, b) => b.score - a.score);
  const matchedThemes = isSearching
    ? sorted.filter(t => t.name.toLowerCase().includes(matchQ) || t.stocks.some(s => s.name.toLowerCase().includes(matchQ)))

  if (isSearching) {

                  <div key={s.code}
                    className={`rank-row${flash ? ` flash-${flash}` : ''}`}
                    style={{gridTemplateColumns:'1fr 72px 58px', display:'flex', alignItems:'center', padding:'10px 14px', gap:8, borderBottom: i < matchedStocks.length-1 ? '1px solid var(--border)' : 'none', cursor:'pointer'}}
                    onClick={() => onStockSelect(s, s.themeName)}>
                    <div>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        {isFav && <span style={{fontSize:10}}>⭐</span>}
                        <span style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{s.name}</span>

                      </div>
                      <div style={{fontSize:10,color:'var(--sub)',marginTop:1}}>{s.code}</div>

                    <div style={{marginLeft:'auto',textAlign:'right'}}>
                      <div style={{fontSize:14,fontWeight:700}} className={isUp?'up':'down'}>{s.price ? fmt.price(s.price) : <span style={{color:'var(--sub)',fontSize:11}}>클릭 시 조회</span>}</div>
                      <div style={{fontSize:11,fontWeight:600}} className={isUp?'up':'down'}>{s.price ? fmt.change(s.change) : ''}</div>

function CalendarView() {
  const today=new Date();
  const [cur,setCur]=useState(today);
  const y=cur.getFullYear(), m=cur.getMonth();
  const start=new Date(y,m,1), end=new Date(y,m+1,0);
  const startDay=start.getDay(), total=end.getDate();
  const weeks=[]; let dc=1-startDay;
  for(let w=0;w<6;w++){const wk=[];for(let d=0;d<7;d++){wk.push(dc);dc++;}weeks.push(wk);if(dc>total)break;}
  const selKey=`${y}-${String(m+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
  const events=CALENDAR_EVENTS[selKey]||[];
  const days=['일','월','화','수','목','금','토'];
  const typeColor={red:'#e53e3e',orange:'#dd6b20',navy:'#2b6cb0',blue:'#3182ce',gray:'#718096'};
  return (
    <div className="calendar-view">
      <div className="cal-header">
        <button className="cal-nav" onClick={()=>setCur(new Date(y,m-1,1))}>‹</button>
        <span className="cal-title">{y}년 {m+1}월</span>
        <button className="cal-nav" onClick={()=>setCur(new Date(y,m+1,1))}>›</button>
        <div className="cal-view-toggle">
          <button className="cal-toggle-btn">월</button>
          <button className="cal-toggle-btn active">주</button>
          <button className="cal-toggle-btn">목</button>
        </div>
      </div>
      <div className="cal-grid">
        {days.map(d=><div key={d} className="cal-day-label">{d}</div>)}
        {weeks.flat().map((d,i)=>{
          const valid=d>=1&&d<=total;
          const dk=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const haEv=CALENDAR_EVENTS[dk];
          const isToday=valid&&d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
          const isSel=valid&&d===cur.getDate();
          return (
            <div key={i} className={`cal-day${!valid?' cal-day-empty':''}${isToday?' cal-today':''}${isSel&&!isToday?' cal-selected':''}`}
              onClick={()=>valid&&setCur(new Date(y,m,d))}>
              {valid&&<><span className="cal-day-num">{d}</span>{haEv&&<span className="cal-dot"/>}</>}
            </div>
          );
        })}
      </div>
      <div className="cal-events">
        <div className="cal-events-date">{selKey.replace(/-/g,'.')}({days[cur.getDay()]})</div>
        {events.length===0
          ?<div className="cal-no-event">일정이 없습니다.</div>
          :events.map((ev,i)=>(
            <div key={i} className="cal-event-item">
              <span className="cal-event-dot" style={{color:typeColor[ev.type]}}>●</span>
              <span className="cal-event-text">{ev.text}</span>
            </div>
          ))
        }
      </div>
      <div className="cal-legend">
        <span style={{color:typeColor.red}}>● 공모/실적</span>
        <span style={{color:typeColor.orange}}>● 정부/정책</span>
        <span style={{color:typeColor.navy}}>● 보호해제</span>
        <span style={{color:typeColor.blue}}>● 해외지표</span>
        <span style={{color:typeColor.gray}}>● 휴장</span>
      </div>
    </div>
  );
}

function IndexChartModal({index, onClose}) {
  const [period, setPeriod] = useState('1M');
  // 1분봉/3분봉 = 분봉(캔들), 나머지 = 일봉 라인차트
  const PERIODS = {'1분':null,'3분':null,'1W':7,'1M':30,'3M':90,'1Y':250};
  const isCandle = period === '1분' || period === '3분';
  const isUp = index.changeRate >= 0;
  const upColor = '#e53e3e', downColor = '#3182ce';
  const lineColor = isUp ? upColor : downColor;

  // 라인차트 데이터
  const days = PERIODS[period] || 30;
  const lineData = React.useMemo(
    () => isCandle ? [] : generateChartData(index.value, days),
    [index.value, days, isCandle]
  );

  // 분봉 캔들 데이터
  const candleData = React.useMemo(
    () => isCandle ? generateCandleData(index.value, 60, period==='1분'?1:3) : [],
    [index.value, period, isCandle]
  );

  const fmt2 = v => v >= 1000
    ? v.toLocaleString('ko-KR',{maximumFractionDigits:0})
    : v.toFixed(2);

  const W = 370, H = 170;
  const padL = 52, padR = 10, padT = 10, padB = 24;
  const cW = W - padL - padR, cH = H - padT - padB;

  // ── 라인차트 SVG ──
  const LineChart = () => {
    const minV = Math.min(...lineData);
    const maxV = Math.max(...lineData);
    const range = maxV - minV || 1;
    const toX = i => padL + (i / (lineData.length - 1)) * cW;
    const toY = v => padT + cH - ((v - minV) / range) * cH;
    const pts = lineData.map((v,i)=>`${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
    const area = [
      `M ${toX(0).toFixed(1)},${toY(lineData[0]).toFixed(1)}`,
      ...lineData.slice(1).map((v,i)=>`L ${toX(i+1).toFixed(1)},${toY(v).toFixed(1)}`),
      `L ${toX(lineData.length-1).toFixed(1)},${(padT+cH).toFixed(1)}`,
      `L ${toX(0).toFixed(1)},${(padT+cH).toFixed(1)} Z`,
    ].join(' ');
    const yT = [0,.25,.5,.75,1].map(f=>({v:minV+f*range,y:padT+cH-f*cH}));
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={lineColor} stopOpacity="0.18"/>
            <stop offset="100%" stopColor={lineColor} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {yT.map((t,i)=>(
          <g key={i}>
            <line x1={padL} y1={t.y.toFixed(1)} x2={W-padR} y2={t.y.toFixed(1)} stroke="#EDE0D8" strokeWidth="0.6"/>
            <text x={padL-4} y={t.y+3.5} fontSize="8.5" textAnchor="end" fill="#9C8878">{fmt2(t.v)}</text>
          </g>
        ))}
        <path d={area} fill="url(#lg1)"/>
        <polyline points={pts} fill="none" stroke={lineColor} strokeWidth="1.8" strokeLinejoin="round"/>
        <circle cx={toX(lineData.length-1).toFixed(1)} cy={toY(lineData[lineData.length-1]).toFixed(1)} r="4" fill={lineColor}/>
        {[0, Math.floor((days-1)/2), days-1].map((idx2,i)=>(
          <text key={i} x={toX(idx2).toFixed(1)} y={H-2} fontSize="8.5" textAnchor="middle" fill="#9C8878">
            {idx2===days-1?'오늘':`${days-1-idx2}일전`}
          </text>
        ))}
      </svg>
    );
  };

  // ── 캔들차트 SVG ──
  const CandleChart = () => {
    const allVals = candleData.flatMap(c=>[c.high,c.low]);
    const minV = Math.min(...allVals);
    const maxV = Math.max(...allVals);
    const range = maxV - minV || 1;
    const n = candleData.length;
    const toX = i => padL + (i + 0.5) / n * cW;
    const toY = v => padT + cH - ((v - minV) / range) * cH;
    const cw = Math.max(2, cW / n - 1.2);  // 봉 너비
    // X축 레이블 인덱스 (처음, 중간, 끝)
    const xLabels = [0, Math.floor(n/2), n-1];
    const yT = [0,.25,.5,.75,1].map(f=>({v:minV+f*range,y:padT+cH-f*cH}));
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>
        {yT.map((t,i)=>(
          <g key={i}>
            <line x1={padL} y1={t.y.toFixed(1)} x2={W-padR} y2={t.y.toFixed(1)} stroke="#EDE0D8" strokeWidth="0.6"/>
            <text x={padL-4} y={t.y+3.5} fontSize="8.5" textAnchor="end" fill="#9C8878">{fmt2(t.v)}</text>
          </g>
        ))}
        {candleData.map((c,i)=>{
          const cx = toX(i);
          const bodyTop    = Math.min(toY(c.open), toY(c.close));
          const bodyBot    = Math.max(toY(c.open), toY(c.close));
          const bodyH      = Math.max(1, bodyBot - bodyTop);
          const isRed      = c.close >= c.open;
          const col        = isRed ? upColor : downColor;
          return (
            <g key={i}>
              {/* 위 꼬리 */}
              <line x1={cx.toFixed(1)} y1={toY(c.high).toFixed(1)} x2={cx.toFixed(1)} y2={bodyTop.toFixed(1)} stroke={col} strokeWidth="0.8"/>
              {/* 몸통 */}
              <rect x={(cx-cw/2).toFixed(1)} y={bodyTop.toFixed(1)} width={cw.toFixed(1)} height={bodyH.toFixed(1)} fill={col} opacity="0.85"/>
              {/* 아래 꼬리 */}
              <line x1={cx.toFixed(1)} y1={bodyBot.toFixed(1)} x2={cx.toFixed(1)} y2={toY(c.low).toFixed(1)} stroke={col} strokeWidth="0.8"/>
            </g>
          );
        })}
        {xLabels.map((idx2,i)=>(
          <text key={i} x={toX(idx2).toFixed(1)} y={H-2} fontSize="8" textAnchor="middle" fill="#9C8878">
            {candleData[idx2]?.label}
          </text>
        ))}
      </svg>
    );
  };

  // stat bar용
  const allVals2 = isCandle ? candleData.flatMap(c=>[c.high,c.low]) : lineData;
  const minV2 = allVals2.length ? Math.min(...allVals2) : index.value;
  const maxV2 = allVals2.length ? Math.max(...allVals2) : index.value;

  return (
    <div className="chart-modal-overlay" onClick={onClose}>
      <div className="chart-modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="chart-modal-header">
          <div>
            <div className="chart-modal-title">{index.flag} {index.name}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.75)',marginTop:2}}>
              {isCandle ? `${period}봉 차트 (당일 시뮬레이션)` : '일봉 차트 (추세 시뮬레이션)'}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:18,fontWeight:900,color:'#fff'}}>{index.value.toLocaleString('ko-KR',{maximumFractionDigits:2})}</div>
              <div style={{fontSize:12,fontWeight:700,color: isUp ? '#fca5a5' : '#93c5fd'}}>
                {isUp?'▲':'▼'} {Math.abs(index.change).toFixed(2)} ({isUp?'+':''}{index.changeRate.toFixed(2)}%)
              </div>
            </div>
            <button className="theme-modal-close" onClick={onClose}>✕</button>
          </div>
        </div>
        <div className="chart-body">
          <div className="chart-period-tabs">
            {Object.keys(PERIODS).map(p=>(
              <button key={p} className={`chart-period-btn${period===p?' active':''}`} onClick={()=>setPeriod(p)}>
                {p==='1분'?'1분봉':p==='3분'?'3분봉':p}
              </button>
            ))}
          </div>
          {isCandle ? <CandleChart/> : <LineChart/>}
          <div className="chart-stat-row">
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--sub)',marginBottom:2}}>최저</div>
              <div style={{fontSize:12,fontWeight:700,color:'var(--down)'}}>{fmt2(minV2)}</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--sub)',marginBottom:2}}>현재</div>
              <div style={{fontSize:14,fontWeight:900,color:lineColor}}>{fmt2(index.value)}</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--sub)',marginBottom:2}}>최고</div>
              <div style={{fontSize:12,fontWeight:700,color:'var(--up)'}}>{fmt2(maxV2)}</div>
            </div>
          </div>
          <div style={{marginTop:8,fontSize:10,color:'var(--sub)',textAlign:'center'}}>
            ※ KIS API 지수 히스토리 연동 전까지는 시뮬레이션 데이터입니다
          </div>
        </div>
      </div>
    </div>
  );
}

  const [selectedTheme, setSelectedTheme] = useState(null);
  const [selectedIndex, setSelectedIndex] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [favs, setFavs] = useState(()=>LS.getFavs());
  const {themes, indices, ranking, flashMap, apiStatus, lastUpdated, refreshing, manualRefresh} = useRealtimeData();

  const handleLogoClick = useCallback(() => {
    setActiveTab('market');
    setSearchQuery('');
  }, []);

  const handleStockSelect = (stock, themeName) => {
    setSelectedTheme(null);
    setSelectedStock({...stock, themeName});
  };

  const handleToggleFav = useCallback((code) => {
    setFavs(LS.toggleFav(code));
  }, []);

  return (
    <div className="app-container">
      <Header searchQuery={searchQuery} setSearchQuery={setSearchQuery} apiStatus={apiStatus} lastUpdated={lastUpdated} refreshing={refreshing} onRefresh={manualRefresh} onLogoClick={handleLogoClick}/>
      <div className="content-area">
        {activeTab==='market'&&<>
          <MarketIndices indices={indices} onIndexClick={setSelectedIndex}/>
          <NewsTicker/>
          <ThemeGrid themes={themes} flashMap={flashMap} favs={favs} searchQuery={searchQuery} onThemeClick={setSelectedTheme} onStockSelect={handleStockSelect}/>
        </>}
        {activeTab==='ranking'&&<RankingView ranking={ranking} flashMap={flashMap} favs={favs} onStockSelect={handleStockSelect} onToggleFav={handleToggleFav}/>}
        {activeTab==='calendar'&&<CalendarView/>}
        {activeTab==='favorites'&&<FavoritesView themes={themes} ranking={ranking} favs={favs} flashMap={flashMap} onStockSelect={handleStockSelect} onToggleFav={handleToggleFav}/>}
        {activeTab==='overview'&&<MarketOverview indices={indices}/>}
      </div>
      <BottomNav activeTab={activeTab} setActiveTab={setActiveTab}/>

      {selectedTheme&&(
        <ThemeDetailModal
          theme={selectedTheme}
          flashMap={flashMap}
          favs={favs}
          onStockSelect={handleStockSelect}
          onToggleFav={handleToggleFav}
          onClose={()=>setSelectedTheme(null)}
        />
      )}
      {selectedStock&&(
        <StockDetail
          stock={selectedStock}
          favs={favs}
          onClose={()=>setSelectedStock(null)}
          onToggleFav={handleToggleFav}
        />
      )}
      {selectedIndex&&(
        <IndexChartModal
          index={selectedIndex}
          onClose={()=>setSelectedIndex(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
